        /* -----------------------------------------------------------
           NEW: Vintage Botanical Aesthetic Styles (Based on image_0.png)

        :root {
            /* Palette derived from the provided image */
            --color-bg-primary: #F8F5E9; /* Warm parchment */
            --color-text-charcoal: #3D3D3D; /* Muted charcoal */
            --color-accent-terracotta: #A66551; /* Warm copper/red-brown */
            --color-accent-ochre: #CB914C; /* Gold/yellow accent */
            --color-accent-sage: #80967C; /* Soft green accent */
            --color-border-dark: #3F3C36; /* Dark vintage line */
            --color-border-light: #C4B9AA; /* Lighter vintage line */
        }

        body {
            background-color: var(--color-bg-primary);
            color: var(--color-text-charcoal);
            font-family: 'Crimson Pro', serif; /* A classier, slightly vintage serif */
        }

        /* Vintage line art patterns (placeholder or simplified) */
        .vintage-pattern-bg {
            background-image: 
                linear-gradient(rgba(196, 185, 170, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(196, 185, 170, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Custom frame styles for panels and buttons */
        .vintage-frame {
            border: 2px solid var(--color-border-dark);
            border-radius: 4px;
            position: relative;
            background: var(--color-bg-primary);
        }
        
        /* Inner decorative border logic */
        .vintage-frame::after {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid var(--color-accent-sage);
            pointer-events: none;
            border-radius: 2px;
        }

        /* Specialized panel look from the image (like "Anther Wall Layers") */
        .botanical-panel {
            background: #FFFEF9; /* Even lighter for emphasis */
            border: 1px solid var(--color-border-light);
            border-radius: 4px;
            box-shadow: inset 0 0 10px rgba(128, 150, 124, 0.1);
        }

        /* Styling for list bullet pattern */
        .botanical-list li {
            position: relative;
            padding-left: 1.5rem;
        }
        .botanical-list li::before {
            content: '🌿'; /* A botanical symbol for a bullet */
            position: absolute;
            left: 0;
            color: var(--color-accent-sage);
            font-size: 0.8rem;
        }

        /* Stylized headings from image */
        .stylized-heading {
            font-family: 'Playfair Display', serif; /* Elegant, classic serif */
            color: var(--color-accent-terracotta);
            text-transform: capitalize; /* Like 'Engineered For Learning' */
            border-bottom: 2px solid var(--color-border-dark);
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        /* Button styles: outlined and filled terracota */
        .btn-vintage-outline {
            border: 2px solid var(--color-border-dark);
            border-radius: 2px;
            color: var(--color-border-dark);
            background: transparent;
            transition: all 0.3s ease;
        }
        .btn-vintage-outline:hover {
            background: rgba(63, 60, 54, 0.05);
        }
        
        .btn-vintage-filled {
            background-color: var(--color-accent-terracotta);
            color: white;
            border-radius: 2px;
            border: 2px solid var(--color-accent-terracotta);
            transition: all 0.3s ease;
        }
        .btn-vintage-filled:hover {
            opacity: 0.9;
        }
